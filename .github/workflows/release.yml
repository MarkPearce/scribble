name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Stamp version in module.json
        run: |
          jq --arg v "${{ steps.version.outputs.version }}" \
            '.version = $v' \
            module.json > module.tmp && mv module.tmp module.json

      - name: Build zip
        run: |
          zip -r module.zip \
            module.json \
            scripts/ \
            styles/ \
            languages/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            module.zip
            module.json
          generate_release_notes: true
